<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>homelabd Dashboard Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 560px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #475569;
        line-height: 1.6;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #0f172a;
          color: #e2e8f0;
        }

        p {
          color: #94a3b8;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>homelabd dashboard is offline</h1>
      <p>
        Reconnect to the homelabd network and refresh. Live task, health, terminal, and supervisor
        data is not cached because it can become unsafe when stale.
      </p>
    </main>
  </body>
</html>
