services:
  postgres:
    image: docker.io/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?run services/element/bootstrap/init.sh first}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - ${ELEMENT_DATA_DIR:-./data/element}/postgres:/var/lib/postgresql/data:Z

  synapse:
    image: docker.io/matrixdotorg/synapse:latest
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
      TZ: ${TZ:-UTC}
      UID: ${PUID:-1000}
      GID: ${PGID:-1000}
    command: ["run", "--config-path=/data/homeserver.yaml", "--config-path=/data/local.yaml"]
    ports:
      - "${SYNAPSE_PORT:-8008}:8008"
    volumes:
      - ${ELEMENT_DATA_DIR:-./data/element}/synapse:/data:Z

  element-web:
    image: docker.io/vectorim/element-web:latest
    restart: unless-stopped
    depends_on:
      - synapse
    environment:
      ELEMENT_WEB_PORT: ${ELEMENT_WEB_PORT:-8080}
    ports:
      - "${ELEMENT_PORT:-8080}:${ELEMENT_WEB_PORT:-8080}"
    volumes:
      - ${ELEMENT_DATA_DIR:-./data/element}/element-web/config.json:/app/config.json:ro,Z
